<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAG STUDIO</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f0f0ee; color:#111; font-size:14px; overflow:hidden; height:100vh; display:flex; flex-direction:column; }

/* ── 헤더 ── */
header { background:#111; color:#fff; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
header h1 { font-size:30px; font-weight:700; letter-spacing:0.08em; }
header span { font-size:11px; color:#555; }

/* ── 역할 바 ── */
.role-bar { background:#18181b; padding:0 20px; height:46px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.role-btn { padding:7px 20px; font-size:14px; font-weight:600; border:2px solid #3f3f46; background:transparent; color:#a1a1aa; cursor:pointer; transition:all 0.15s; }
.role-btn.active { background:#fff; color:#111; border-color:#fff; }
.role-btn:hover:not(.active) { border-color:#71717a; color:#d4d4d8; }

/* ── 단계 바 ── */
.stage-bar { background:#fff; border-bottom:1px solid #e8e8e8; padding:0 16px; height:40px; display:flex; align-items:center; gap:6px; flex-shrink:0; overflow-x:auto; }
.stage-btn { padding:4px 12px; font-size:13px; font-weight:500; border:1px solid #e0e0e0; background:#fff; color:#666; cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; transition:all 0.15s; }
.stage-btn:hover { border-color:#999; color:#333; }
.stage-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.stage-btn[data-stage="all"] .stage-dot { background:#999; }
.stage-btn[data-stage="pm_set"] .stage-dot { background:#e65100; }
.stage-btn[data-stage="tagger_done"] .stage-dot { background:#1565c0; }
.stage-btn[data-stage="pm_confirm1"] .stage-dot { background:#2e7d32; }
.stage-btn[data-stage="dev_done"] .stage-dot { background:#6a1b9a; }
.stage-btn[data-stage="pm_confirm2"] .stage-dot { background:#283593; }
/* 활성 단계별 컬러 */
.stage-btn.active[data-stage="all"] { background:#111; border-color:#111; color:#fff; }
.stage-btn.active[data-stage="all"] .stage-dot { background:#fff; }
.stage-btn.active[data-stage="pm_set"] { background:#e65100; border-color:#e65100; color:#fff; }
.stage-btn.active[data-stage="tagger_done"] { background:#1565c0; border-color:#1565c0; color:#fff; }
.stage-btn.active[data-stage="pm_confirm1"] { background:#2e7d32; border-color:#2e7d32; color:#fff; }
.stage-btn.active[data-stage="dev_done"] { background:#6a1b9a; border-color:#6a1b9a; color:#fff; }
.stage-btn.active[data-stage="pm_confirm2"] { background:#283593; border-color:#283593; color:#fff; }
.stage-btn.active .stage-dot { background:#fff !important; }

/* ── Flow 바 ── */
.flow-bar { background:#1a1a1a; border-bottom:1px solid #2a2a2a; padding:8px 16px; display:flex; gap:0; align-items:center; flex-shrink:0; overflow-x:auto; justify-content:flex-start; }
.flow-overview-btn { flex-shrink:0; padding:4px 12px; font-size:11px; border:1px solid #444; background:transparent; color:#aaa; cursor:pointer; margin-right:12px; }
.flow-overview-btn:hover, .flow-overview-btn.active { background:#fff; color:#111; border-color:#fff; }
.flow-bar-label { font-size:10px; color:#555; letter-spacing:0.08em; text-transform:uppercase; margin-right:12px; flex-shrink:0; }
.flow-thumb { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; opacity:0.45; transition:opacity 0.15s; flex-shrink:0; padding:0 6px; position:relative; }
.flow-thumb:hover { opacity:0.75; }
.flow-thumb.active { opacity:1; }
.flow-thumb img { width:40px; height:68px; object-fit:cover; object-position:top; border:2px solid transparent; display:block; }
.flow-thumb.active img { border-color:#fff; }
.flow-thumb-label { font-size:9px; color:#777; }
.flow-thumb.active .flow-thumb-label { color:#fff; }
.flow-thumb-badge { position:absolute; top:0; right:4px; font-size:8px; background:#e53935; color:#fff; padding:1px 4px; min-width:14px; text-align:center; }
.flow-arrow { color:#333; font-size:14px; flex-shrink:0; padding:0 2px; }

/* ── 메인 ── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── 캔버스 ── */
.canvas-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.canvas-scroll { flex:1; overflow:auto; display:flex; align-items:flex-start; justify-content:center; padding:28px; background:#e0e0de; }
.canvas-wrap { position:relative; display:inline-block; flex-shrink:0; box-shadow:0 8px 32px rgba(0,0,0,0.25); }
#tagCanvas { display:block; }

/* ── 시트 탭 ── */
.sheet-tabs { background:#ebebea; border-top:1px solid #d8d8d6; display:flex; align-items:center; flex-shrink:0; overflow-x:auto; height:30px; padding:0 6px; }
.sheet-tab { padding:0 14px; height:100%; display:flex; align-items:center; font-size:11px; cursor:pointer; border:none; background:none; color:#888; white-space:nowrap; border-top:2px solid transparent; flex-shrink:0; }
.sheet-tab.active { color:#111; font-weight:700; background:#fff; border-top:2px solid #111; }
.sheet-tab:hover:not(.active) { background:#e0e0de; }

/* ── 사이드 ── */
.side { width:340px; display:flex; flex-direction:column; border-left:1px solid #e0e0e0; background:#fff; flex-shrink:0; overflow:hidden; }
.side-header { padding:10px 14px; border-bottom:1px solid #eee; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; background:#fafafa; }
.side-header h2 { font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#555; }
.tag-filter-bar { display:flex; gap:3px; padding:8px 10px; border-bottom:1px solid #eee; flex-wrap:wrap; background:#fafafa; }
.tag-filter { padding:3px 8px; font-size:10px; border:1px solid #e0e0e0; background:#fff; cursor:pointer; color:#666; display:flex; align-items:center; gap:4px; }
.tag-filter:hover { border-color:#111; color:#111; }
.tag-filter.active { background:#111; color:#fff; border-color:#111; }
.tag-filter .stage-dot { width:6px; height:6px; border-radius:50%; }
.tag-content { flex:1; overflow-y:auto; padding:10px; }

/* ── 태그 아이템 ── */
.tag-item { border:1px solid #eee; margin-bottom:8px; overflow:hidden; }
.tag-item.filtered { display:none; }
.tag-header { display:flex; align-items:center; gap:7px; padding:8px 10px; background:#fafafa; border-bottom:1px solid #f0f0f0; }
.tag-num-badge { font-size:10px; font-weight:700; color:#fff; padding:2px 7px; flex-shrink:0; }
.tag-title { font-size:11px; font-weight:600; flex:1; }
.tag-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.del-btn { font-size:10px; color:#ccc; border:none; background:none; cursor:pointer; flex-shrink:0; }
.del-btn:hover { color:#e53935; }
.tag-desc { padding:6px 10px; font-size:11px; color:#666; border-bottom:1px solid #f5f5f5; line-height:1.5; }
.tag-name-row { padding:6px 10px; border-bottom:1px solid #eee; }
.tag-name-input { width:100%; border:none; border-bottom:1px dashed #ddd; padding:3px 4px; font-size:11px; font-family:inherit; outline:none; color:#1e88e5; font-weight:600; background:transparent; }
.tag-name-input::placeholder { color:#ccc; font-weight:400; }
.tag-name-input:focus { border-bottom-color:#1e88e5; }
.tag-name-input[readonly] { opacity:0.55; cursor:not-allowed; background:#f5f5f5; }
.tag-name-display { font-size:11px; color:#1e88e5; font-weight:600; font-family:monospace; }
/* 상태 드롭다운 */
.wf-select-wrap { padding:7px 10px; }
.wf-select { width:100%; border:none; border-left:4px solid #e0e0e0; padding:5px 8px; font-size:11px; font-family:inherit; outline:none; cursor:pointer; background:#fafafa; transition:border-color 0.15s; }
.wf-select[data-status="pm_set"]      { border-left-color:#e65100; color:#e65100; background:#fff8f5; }
.wf-select[data-status="tagger_done"] { border-left-color:#1565c0; color:#1565c0; background:#f0f4ff; }
.wf-select[data-status="pm_confirm1"] { border-left-color:#2e7d32; color:#2e7d32; background:#f0fdf0; }
.wf-select[data-status="dev_done"]    { border-left-color:#6a1b9a; color:#6a1b9a; background:#faf0ff; }
.wf-select[data-status="pm_confirm2"] { border-left-color:#283593; color:#283593; background:#f0f2ff; }

/* ── 화면 섹션 헤더 (전체보기) ── */
.screen-section-header { display:flex; align-items:center; gap:8px; padding:8px 10px; background:#f0f0ee; border-bottom:1px solid #e0e0e0; margin-bottom:6px; margin-top:8px; }
.screen-section-header:first-child { margin-top:0; }
.screen-section-title { font-size:11px; font-weight:700; color:#555; flex:1; }
.screen-section-badge { font-size:9px; background:#111; color:#fff; padding:1px 6px; }

/* ── 전체보기 / 대시보드 ── */
.dash-card { background:#fff; border:1px solid #e0e0e0; width:130px; flex-shrink:0; cursor:pointer; transition:box-shadow 0.15s; }
.dash-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.12); }
.dash-card img { width:100%; height:190px; object-fit:cover; object-position:top; display:block; }
.dash-card-info { padding:7px 9px; }
.dash-card-name { font-size:11px; font-weight:700; margin-bottom:5px; }
.dash-card-stats { display:flex; gap:3px; flex-wrap:wrap; }
.dash-stat { font-size:9px; padding:1px 4px; }
.dash-arrow { display:flex; align-items:center; padding:0 3px; color:#444; font-size:18px; }
.summary-card { background:#fff; border:1px solid #eee; padding:12px; text-align:center; }
.summary-card .num { font-size:26px; font-weight:700; margin-bottom:3px; }
.summary-card .lbl { font-size:10px; color:#aaa; }

/* ── 모달 ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; width:360px; box-shadow:0 16px 48px rgba(0,0,0,0.2); }
.modal-header { background:#111; color:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
.modal-header h3 { font-size:13px; font-weight:600; }
.mclose { font-size:18px; cursor:pointer; color:#888; border:none; background:none; }
.modal-body { padding:16px; display:flex; flex-direction:column; gap:10px; }
.mfield label { font-size:10px; color:#888; display:block; margin-bottom:4px; }
.mfield textarea { width:100%; border:1px solid #e0e0e0; padding:8px; font-size:12px; font-family:inherit; resize:none; height:64px; outline:none; }
.mfield textarea:focus { border-color:#111; }
.mfield select { width:100%; border:1px solid #e0e0e0; padding:7px; font-size:12px; font-family:inherit; outline:none; }
.modal-actions { padding:10px 16px; border-top:1px solid #eee; display:flex; gap:8px; justify-content:flex-end; }
.mbtn { padding:6px 14px; font-size:11px; border:none; cursor:pointer; }
.mbtn.primary { background:#111; color:#fff; }
.mbtn.cancel { background:#f0f0f0; color:#555; }
.empty { color:#bbb; font-size:11px; text-align:center; padding:28px 0; line-height:1.8; }
code { font-size:10px; background:#f5f5f5; padding:1px 4px; font-family:monospace; }
</style>
</head>
<body>

<header>
  <h1>TAG STUDIO</h1>
  <span>장기카드대출(카드론) · 해커톤 데모</span>
</header>

<!-- 역할 바 -->
<div class="role-bar">
  <button class="role-btn active" id="role-pm" onclick="setRole('pm',this)">기획자 PM</button>
  <button class="role-btn" id="role-tagger" onclick="setRole('tagger',this)">태깅 담당자</button>
  <button class="role-btn" id="role-dev" onclick="setRole('dev',this)">개발자</button>
</div>

<!-- 단계 바 -->
<div class="stage-bar">
  <button class="stage-btn active" data-stage="all" id="sf-all" onclick="setStatusFilter('all',this)"><span class="stage-dot"></span>전체</button>
  <button class="stage-btn" data-stage="pm_set" id="sf-pm_set" onclick="setStatusFilter('pm_set',this)"><span class="stage-dot"></span>요건 지정</button>
  <button class="stage-btn" data-stage="tagger_done" id="sf-tagger_done" onclick="setStatusFilter('tagger_done',this)"><span class="stage-dot"></span>태깅명 정의</button>
  <button class="stage-btn" data-stage="pm_confirm1" id="sf-pm_confirm1" onclick="setStatusFilter('pm_confirm1',this)"><span class="stage-dot"></span>PM 1차 확인</button>
  <button class="stage-btn" data-stage="dev_done" id="sf-dev_done" onclick="setStatusFilter('dev_done',this)"><span class="stage-dot"></span>개발 완료</button>
  <button class="stage-btn" data-stage="pm_confirm2" id="sf-pm_confirm2" onclick="setStatusFilter('pm_confirm2',this)"><span class="stage-dot"></span>최종 완료</button>
</div>

<!-- Flow 바 -->
<div class="flow-bar">
  <button class="flow-overview-btn" id="ft-all" onclick="switchOverview(this)">전체 보기</button>
  <span class="flow-bar-label">Flow</span>
  <div id="flowThumbs" style="display:flex;align-items:center;"></div>
</div>

<div class="main">
  <!-- 대시보드 -->
  <div id="dashboardPanel" style="display:none;flex:1;overflow-y:auto;background:#f0f0ee;padding:32px;">
    <div style="max-width:860px;margin:0 auto;">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:4px;">전체 플로우 현황</h2>
      <p style="font-size:11px;color:#888;margin-bottom:24px;">카드를 클릭하면 해당 화면으로 이동합니다.</p>
      <div id="dashFlow" style="display:flex;gap:0;align-items:flex-start;overflow-x:auto;padding-bottom:16px;margin-bottom:32px;"></div>
      <h3 style="font-size:12px;font-weight:700;margin-bottom:12px;">단계별 현황</h3>
      <div id="dashSummary" style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px;"></div>
    </div>
  </div>

  <!-- 전체 보기 -->
  <div id="overviewPanel" style="display:none;flex:1;overflow:auto;background:#1a1a1a;padding:24px;gap:12px;align-items:flex-start;"></div>

  <!-- 캔버스 -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-scroll">
      <div class="canvas-wrap">
        <canvas id="tagCanvas"></canvas>
      </div>
    </div>
    <div class="sheet-tabs" id="sheetTabs"></div>
  </div>

  <!-- 사이드 -->
  <div class="side">
    <div class="side-header">
      <h2>태깅 포인트</h2>
      <span id="sideTagCount" style="font-size:10px;color:#aaa;"></span>
    </div>
    <div class="tag-filter-bar">
      <button class="tag-filter active" data-filter="all" onclick="setTagFilter('all',this)"><span class="stage-dot" style="background:#999"></span>전체</button>
      <button class="tag-filter" data-filter="pm_set" onclick="setTagFilter('pm_set',this)"><span class="stage-dot" style="background:#e65100"></span>요건</button>
      <button class="tag-filter" data-filter="tagger_done" onclick="setTagFilter('tagger_done',this)"><span class="stage-dot" style="background:#1565c0"></span>태깅</button>
      <button class="tag-filter" data-filter="pm_confirm1" onclick="setTagFilter('pm_confirm1',this)"><span class="stage-dot" style="background:#2e7d32"></span>PM확인</button>
      <button class="tag-filter" data-filter="dev_done" onclick="setTagFilter('dev_done',this)"><span class="stage-dot" style="background:#6a1b9a"></span>개발</button>
      <button class="tag-filter" data-filter="pm_confirm2" onclick="setTagFilter('pm_confirm2',this)"><span class="stage-dot" style="background:#283593"></span>완료</button>
    </div>
    <div class="tag-content" id="tagList">
      <p class="empty">기획자 PM 역할로<br>화면에서 영역을 드래그하세요.</p>
    </div>
  </div>
</div>

<!-- 요건 입력 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">태깅 포인트 등록</h3>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="mfield">
        <label>요건 설명</label>
        <textarea id="modalDesc" placeholder="예: 대출 금액 선택 버튼 클릭 시 이벤트 수집"></textarea>
      </div>
      <div class="mfield">
        <label>태깅 유형</label>
        <select id="modalType">
          <option value="click">클릭 이벤트</option>
          <option value="view">노출 이벤트</option>
          <option value="both">클릭 + 노출</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="mbtn cancel" onclick="closeModal()">취소</button>
      <button class="mbtn primary" onclick="confirmModal()">등록</button>
    </div>
  </div>
</div>

const COLORS = ['#1e88e5','#e53935','#43a047','#fb8c00','#8e24aa','#00acc1','#f06292','#795548'];
const STATUS_COLOR = { pm_set:'#e65100', tagger_done:'#1565c0', pm_confirm1:'#2e7d32', dev_done:'#6a1b9a', pm_confirm2:'#283593' };
const STATUS_LABEL = { pm_set:'요건 지정', tagger_done:'태깅명 정의', pm_confirm1:'PM 1차 확인', dev_done:'개발 완료', pm_confirm2:'최종 완료' };
const STATUS_BG = { pm_set:'#fff3ee', tagger_done:'#f0f4ff', pm_confirm1:'#f0fdf0', dev_done:'#faf0ff', pm_confirm2:'#f0f2ff' };

let allRegions = SCREENS.map(() => []);
let currentIdx = 0;
let currentRole = 'pm';
let currentStatusFilter = 'all';
let currentTagFilter = 'all';
let isDragging = false, dragStart = null, currentRect = null;
let pendingRegion = null;
let isOverview = false;

const canvas = document.getElementById('tagCanvas');
const ctx = canvas.getContext('2d');
const imgCache = {};

function getImg(idx) {
  if (imgCache[idx]) return Promise.resolve(imgCache[idx]);
  return new Promise(res => {
    const img = new Image();
    img.onload = () => { imgCache[idx] = img; res(img); };
    img.src = SCREENS[idx].data;
  });
}

/* ── 역할 ── */
function setRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  canvas.style.cursor = role === 'pm' ? 'crosshair' : 'default';
  renderTagList();
}

/* ── 단계 필터 (상단 ↔ 사이드 연동) ── */
function setStatusFilter(status, btn) {
  currentStatusFilter = status;
  currentTagFilter = status;
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 사이드 태그 필터 동기화
  document.querySelectorAll('.tag-filter').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === status);
  });
  renderTagList();
}

function setTagFilter(filter, btn) {
  currentTagFilter = filter;
  currentStatusFilter = filter;
  document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 상단 단계 필터 동기화
  const stageBtn = document.getElementById('sf-' + filter);
  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
  if (stageBtn) stageBtn.classList.add('active');
  renderTagList();
}

/* ── 플로우 바 ── */
function buildFlowBar() {
  const wrap = document.getElementById('flowThumbs');
  wrap.innerHTML = SCREENS.map((s,i) => `
    <div class="flow-thumb" onclick="switchScreen(${i})" id="ft${i}">
      <img src="${s.data}">
      <span class="flow-thumb-label">${s.name}</span>
    </div>${i<SCREENS.length-1?'<span class="flow-arrow">›</span>':''}
  `).join('');
}

function buildSheetTabs() {
  document.getElementById('sheetTabs').innerHTML =
    `<button class="sheet-tab" id="st-dash" onclick="switchDashboard(this)">📊 대시보드</button>` +
    `<button class="sheet-tab" id="st-overview" onclick="switchOverview(this)">전체</button>` +
    SCREENS.map((s,i) => `<button class="sheet-tab" onclick="switchScreen(${i})" id="st${i}">${i+1}. ${s.name}</button>`).join('');
}

function updateFlowBadges() {
  SCREENS.forEach((_,i) => {
    const el = document.getElementById('ft'+i); if (!el) return;
    let badge = el.querySelector('.flow-thumb-badge');
    const cnt = allRegions[i].length;
    if (cnt > 0) {
      if (!badge) { badge = document.createElement('div'); badge.className='flow-thumb-badge'; el.appendChild(badge); }
      badge.textContent = cnt;
    } else if (badge) badge.remove();
  });
}

/* ── 화면 전환 ── */
function switchScreen(idx) {
  isOverview = false;
  document.getElementById('dashboardPanel').style.display = 'none';
  document.getElementById('overviewPanel').style.display = 'none';
  document.getElementById('canvasArea').style.display = 'flex';
  currentIdx = idx;
  document.getElementById('ft-all').classList.remove('active');
  document.querySelectorAll('.flow-thumb').forEach((el,i) => el.classList.toggle('active', i===idx));
  document.querySelectorAll('.sheet-tab').forEach((el,i) => {
    if (el.id==='st-dash'||el.id==='st-overview') el.classList.remove('active');
    else el.classList.toggle('active', i===idx);
  });
  loadScreen(idx);
  renderTagList();
}

function switchOverview(btn) {
  isOverview = true;
  document.getElementById('overviewPanel').style.display = 'flex';
  document.getElementById('dashboardPanel').style.display = 'none';
  document.getElementById('canvasArea').style.display = 'none';
  document.querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('st-overview').classList.add('active');
  document.querySelectorAll('.flow-thumb').forEach(b => b.classList.remove('active'));
  document.getElementById('ft-all').classList.add('active');
  renderOverview();
  renderTagList();
}

function switchDashboard(btn) {
  isOverview = false;
  document.getElementById('dashboardPanel').style.display = 'flex';
  document.getElementById('overviewPanel').style.display = 'none';
  document.getElementById('canvasArea').style.display = 'none';
  document.querySelectorAll('.sheet-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('st-dash').classList.add('active');
  renderDashboard();
}

function loadScreen(idx) {
  getImg(idx).then(img => {
    const MAX_W = document.getElementById('canvasArea').offsetWidth - 56;
    const MAX_H = window.innerHeight - 56 - 46 - 40 - 52 - 30 - 56;
    const scale = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    redraw();
  });
}

function redraw() {
  const img = imgCache[currentIdx]; if (!img) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  if (currentRect) {
    ctx.strokeStyle='#1e88e5'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    ctx.strokeRect(currentRect.x,currentRect.y,currentRect.w,currentRect.h);
    ctx.setLineDash([]);
  }
  allRegions[currentIdx].forEach((r,i) => {
    const c = COLORS[i%COLORS.length];
    const sc = STATUS_COLOR[r.status]||'#ccc';
    ctx.fillStyle = c+'28'; ctx.fillRect(r.x,r.y,r.w,r.h);
    ctx.strokeStyle=c; ctx.lineWidth=1.5; ctx.strokeRect(r.x,r.y,r.w,r.h);
    const label = r.label;
    ctx.font='bold 10px sans-serif';
    const lw = ctx.measureText(label).width+20;
    ctx.fillStyle=c; ctx.fillRect(r.x,Math.max(0,r.y-18),lw,18);
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(label,r.x+4,Math.max(9,r.y-9));
    ctx.beginPath(); ctx.arc(r.x+lw-8,Math.max(9,r.y-9),4,0,Math.PI*2);
    ctx.fillStyle=sc; ctx.fill();
  });
}

/* ── 드래그 ── */
canvas.style.cursor='crosshair';
canvas.addEventListener('mousedown', e => {
  if(currentRole!=='pm') return;
  const r=canvas.getBoundingClientRect();
  dragStart={x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};
  isDragging=true;
});
canvas.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const r=canvas.getBoundingClientRect();
  currentRect={x:dragStart.x,y:dragStart.y,w:(e.clientX-r.left)*(canvas.width/r.width)-dragStart.x,h:(e.clientY-r.top)*(canvas.height/r.height)-dragStart.y};
  redraw();
});
canvas.addEventListener('mouseup', e => {
  if(!isDragging) return;
  isDragging=false;
  const r=canvas.getBoundingClientRect();
  const w=(e.clientX-r.left)*(canvas.width/r.width)-dragStart.x;
  const h=(e.clientY-r.top)*(canvas.height/r.height)-dragStart.y;
  currentRect=null;
  if(Math.abs(w)<8||Math.abs(h)<8){redraw();return;}
  const num=allRegions[currentIdx].length+1;
  pendingRegion={x:dragStart.x,y:dragStart.y,w,h,label:`요건${num}`,tagName:'',type:'click',desc:'',status:'pm_set'};
  document.getElementById('modalTitle').textContent=`요건${num} 등록`;
  document.getElementById('modalDesc').value='';
  document.getElementById('modalType').value='click';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('modalDesc').focus(),100);
});

function closeModal(){document.getElementById('modal').classList.remove('show');pendingRegion=null;redraw();}
function confirmModal(){
  if(!pendingRegion)return;
  pendingRegion.desc=document.getElementById('modalDesc').value;
  pendingRegion.type=document.getElementById('modalType').value;
  allRegions[currentIdx].push(pendingRegion);
  pendingRegion=null;
  document.getElementById('modal').classList.remove('show');
  redraw();renderTagList();updateFlowBadges();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ── 태그 목록 렌더 ── */
function renderTagList() {
  const list = document.getElementById('tagList');

  if (isOverview) {
    // 전체보기: 화면별 섹션으로 나누기
    let html = '';
    let totalVisible = 0;
    SCREENS.forEach((s, si) => {
      const regs = allRegions[si];
      const filtered = regs.filter(r => currentTagFilter==='all' || r.status===currentTagFilter);
      if (!filtered.length) return;
      totalVisible += filtered.length;
      html += `<div class="screen-section-header">
        <span class="screen-section-title">${si+1}. ${s.name}</span>
        <span class="screen-section-badge">${filtered.length}</span>
      </div>`;
      filtered.forEach((r, ri) => {
        const origIdx = regs.indexOf(r);
        html += renderTagItem(r, origIdx, si);
      });
    });
    if (!html) html = '<p class="empty">해당 단계의 태깅 포인트가 없습니다.</p>';
    list.innerHTML = html;
    document.getElementById('sideTagCount').textContent = totalVisible ? `${totalVisible}개` : '';
    return;
  }

  // 단일 화면
  const regions = allRegions[currentIdx];
  if (!regions.length) {
    list.innerHTML = `<p class="empty">${currentRole==='pm'?'드래그로 영역을 지정하세요.':'PM이 영역을 지정하면 표시됩니다.'}</p>`;
    document.getElementById('sideTagCount').textContent = '';
    return;
  }
  const filtered = regions.filter(r => currentTagFilter==='all'||r.status===currentTagFilter);
  document.getElementById('sideTagCount').textContent = `${filtered.length}/${regions.length}개`;
  list.innerHTML = regions.map((r,i) => renderTagItem(r,i,currentIdx)).join('');
}

function renderTagItem(r, i, si) {
  const color = COLORS[i%COLORS.length];
  const sc = STATUS_COLOR[r.status]||'#ccc';
  const hidden = currentTagFilter!=='all' && r.status!==currentTagFilter;
  const isTagger = currentRole==='tagger';
  const canEdit = isTagger && r.status==='pm_set';
  return `<div class="tag-item${hidden?' filtered':''}">
    <div class="tag-header">
      <span class="tag-num-badge" style="background:${color}">${r.label}</span>
      <span class="tag-title">${r.tagName?`<code>${r.tagName}</code>`:r.desc||'설명 없음'}</span>
      <span class="tag-status-dot" style="background:${sc}"></span>
      ${currentRole==='pm'?`<button class="del-btn" onclick="deleteTag(${i},${si})">✕</button>`:''}
    </div>
    ${r.desc?`<div class="tag-desc">${r.desc}</div>`:''}
    <div class="tag-name-row">
      <input class="tag-name-input" placeholder="태깅명 (예: loan_amount_click)"
        value="${r.tagName}" ${canEdit?'':'readonly'}
        oninput="allRegions[${si}][${i}].tagName=this.value">
    </div>
    <div class="wf-select-wrap">
      <select class="wf-select" data-status="${r.status}" onchange="setTagStatus(${i},${si},this)">
        <option value="" ${!r.status?'selected':''}>상태 없음</option>
        <option value="pm_set" ${r.status==='pm_set'?'selected':''}>요건 지정</option>
        <option value="tagger_done" ${r.status==='tagger_done'?'selected':''}>태깅명 정의</option>
        <option value="pm_confirm1" ${r.status==='pm_confirm1'?'selected':''}>PM 1차 확인</option>
        <option value="dev_done" ${r.status==='dev_done'?'selected':''}>개발 완료</option>
        <option value="pm_confirm2" ${r.status==='pm_confirm2'?'selected':''}>최종 완료</option>
      </select>
    </div>
  </div>`;
}

function setTagStatus(i, si, sel) {
  allRegions[si][i].status = sel.value;
  sel.setAttribute('data-status', sel.value);
  redraw(); renderTagList();
}

function deleteTag(i, si) {
  allRegions[si].splice(i,1);
  allRegions[si].forEach((r,idx)=>r.label=`요건${idx+1}`);
  redraw(); renderTagList(); updateFlowBadges();
}

/* ── 전체보기 ── */
function renderOverview() {
  const panel = document.getElementById('overviewPanel');
  panel.innerHTML = '';

  // 전체 카드
  const allWrap = document.createElement('div');
  allWrap.style.cssText='flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;';
  allWrap.onclick=()=>switchDashboard(document.getElementById('st-dash'));
  const allLabel=document.createElement('div');
  allLabel.style.cssText='color:#aaa;font-size:10px;';
  allLabel.textContent='전체';
  const allBox=document.createElement('div');
  allBox.style.cssText='width:90px;height:190px;background:#222;border:2px solid #444;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:border-color 0.15s;';
  allWrap.onmouseenter=()=>allBox.style.borderColor='#fff';
  allWrap.onmouseleave=()=>allBox.style.borderColor='#444';
  const totalCnt=allRegions.reduce((s,r)=>s+r.length,0);
  allBox.innerHTML=`<div style="font-size:20px">🗂</div><div style="color:#fff;font-size:13px;font-weight:700">${totalCnt}</div><div style="color:#666;font-size:10px">전체 태그</div>`;
  allWrap.appendChild(allLabel); allWrap.appendChild(allBox); panel.appendChild(allWrap);
  const arr=document.createElement('div');
  arr.style.cssText='color:#444;font-size:20px;flex-shrink:0;margin-top:80px;'; arr.textContent='›';
  panel.appendChild(arr);

  SCREENS.forEach((s,si)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;';
    wrap.onclick=()=>switchScreen(si);
    const label=document.createElement('div');
    label.style.cssText='color:#aaa;font-size:10px;';
    label.textContent=`${si+1}. ${s.name}`;
    const cvs=document.createElement('canvas');
    cvs.style.cssText='display:block;border:2px solid #333;transition:border-color 0.15s;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
    wrap.onmouseenter=()=>cvs.style.borderColor='#fff';
    wrap.onmouseleave=()=>cvs.style.borderColor='#333';
    wrap.appendChild(label); wrap.appendChild(cvs); panel.appendChild(wrap);
    if(si<SCREENS.length-1){const a=document.createElement('div');a.style.cssText='color:#444;font-size:20px;flex-shrink:0;margin-top:80px;';a.textContent='›';panel.appendChild(a);}
    getImg(si).then(img=>{
      const THUMB_H=190; const scale=THUMB_H/img.height;
      cvs.width=Math.round(img.width*scale); cvs.height=THUMB_H;
      const c=cvs.getContext('2d'); c.drawImage(img,0,0,cvs.width,cvs.height);
      allRegions[si].forEach((r,i)=>{
        const col=COLORS[i%COLORS.length]; const sc=STATUS_COLOR[r.status]||'#ccc';
        c.fillStyle=col+'28'; c.fillRect(r.x*scale,r.y*scale,r.w*scale,r.h*scale);
        c.strokeStyle=col; c.lineWidth=1.5; c.strokeRect(r.x*scale,r.y*scale,r.w*scale,r.h*scale);
        const lbl=r.label; c.font='bold 9px sans-serif';
        const lw=c.measureText(lbl).width+14;
        c.fillStyle=col; c.fillRect(r.x*scale,Math.max(0,r.y*scale-16),lw,16);
        c.fillStyle='#fff'; c.textAlign='left'; c.textBaseline='middle';
        c.fillText(lbl,r.x*scale+3,Math.max(8,r.y*scale-8));
        c.beginPath(); c.arc(r.x*scale+lw-6,Math.max(8,r.y*scale-8),3,0,Math.PI*2);
        c.fillStyle=sc; c.fill();
      });
    });
  });
}

/* ── 대시보드 ── */
function renderDashboard() {
  const STATUS_BG2={pm_set:'#fff3ee',tagger_done:'#f0f4ff',pm_confirm1:'#f0fdf0',dev_done:'#faf0ff',pm_confirm2:'#f0f2ff'};
  const flowEl=document.getElementById('dashFlow');
  flowEl.innerHTML=SCREENS.map((s,i)=>{
    const regs=allRegions[i]; const counts={};
    regs.forEach(r=>counts[r.status]=(counts[r.status]||0)+1);
    const statBadges=Object.entries(counts).map(([k,v])=>`<span class="dash-stat" style="background:${STATUS_BG2[k]||'#eee'};color:${STATUS_COLOR[k]||'#555'}">${STATUS_LABEL[k]||k} ${v}</span>`).join('');
    return `<div class="dash-card" onclick="switchScreen(${i})">
      <img src="${s.data}">
      <div class="dash-card-info">
        <div class="dash-card-name">${i+1}. ${s.name}</div>
        <div class="dash-card-stats">${regs.length?statBadges:'<span style="font-size:9px;color:#ccc">태그 없음</span>'}</div>
      </div>
    </div>${i<SCREENS.length-1?'<div class="dash-arrow">›</div>':''}`;
  }).join('');

  const all=allRegions.flat();
  const stages=[
    {key:'pm_set',label:'요건 지정'},{key:'tagger_done',label:'태깅명 정의'},
    {key:'pm_confirm1',label:'PM 1차 확인'},{key:'dev_done',label:'개발 완료'},{key:'pm_confirm2',label:'최종 완료'}
  ];
  document.getElementById('dashSummary').innerHTML=stages.map(s=>`
    <div class="summary-card">
      <div class="num" style="color:${STATUS_COLOR[s.key]}">${all.filter(r=>r.status===s.key).length}</div>
      <div class="lbl">${s.label}</div>
    </div>`).join('');
}

buildFlowBar(); buildSheetTabs();
SCREENS.forEach((_,i)=>getImg(i));
switchScreen(0);
</script>
